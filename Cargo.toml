[workspace]
members = ["src-tauri", "pomotoro-domain"]
resolver = "3"

[workspace.dependencies]
# Core Rust ecosystem
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.141"
uuid = { version = "1.0", features = ["v4", "serde", "js"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2.0.12"
async-trait = "0.1"

# Async runtime
tokio = { version = "1.0", features = ["time", "sync", "rt-multi-thread", "test-util", "macros"] }

# Audio
rodio = "0.21.1"

# Testing
tokio-test = "0.4"
tempfile = "3.0"
assert_matches = "1.5"
serial_test = "3.0"

# Tauri ecosystem
tauri = { version = "2.0", features = ["tray-icon"] }
tauri-plugin-opener = "2.0"
tauri-plugin-notification = "2.0"
tauri-plugin-fs = "2.0"
tauri-plugin-shell = "2.0"
tauri-build = { version = "2.0", features = [] }

# Leptos ecosystem (for UI)
leptos = { version = "0.8.3", features = ["csr"] }
leptos_router = { version = "0.8.3" }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
serde-wasm-bindgen = "0.6"
console_error_panic_hook = "0.1.7"
web-sys = "0.3"
anyhow = "1.0.98"

[package]
name = "pomotoro-ui"
version = "0.1.0"
edition = "2024"

[dependencies]
leptos = { workspace = true }
leptos_router = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
js-sys = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde-wasm-bindgen = { workspace = true }
console_error_panic_hook = { workspace = true }
web-sys = { workspace = true }
anyhow = { workspace = true }
pomotoro-domain = { path = "pomotoro-domain" }
