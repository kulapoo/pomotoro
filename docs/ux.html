<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B6B;
            --primary-dark: #FF5252;
            --secondary: #4ECDC4;
            --dark: #2C3E50;
            --light: #ECF0F1;
            --white: #FFFFFF;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 250px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            box-shadow: var(--shadow);
            transition: var(--transition);
            z-index: 1000;
        }

        .sidebar.collapsed {
            width: 60px;
        }

        .sidebar-header {
            padding: 20px;
            background: var(--primary);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar.collapsed .sidebar-header {
            padding: 20px 15px;
        }

        .sidebar-title {
            font-size: 1.2rem;
            font-weight: bold;
            transition: var(--transition);
        }

        .sidebar.collapsed .sidebar-title {
            display: none;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.5rem;
            transition: transform 0.3s;
        }

        .toggle-btn:hover {
            transform: scale(1.1);
        }

        .nav-menu {
            list-style: none;
            padding: 20px 0;
        }

        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--dark);
        }

        .sidebar.collapsed .nav-item {
            padding: 15px;
            justify-content: center;
        }

        .nav-item:hover {
            background: rgba(78, 205, 196, 0.1);
            border-left: 4px solid var(--secondary);
        }

        .nav-item.active {
            background: rgba(255, 107, 107, 0.1);
            border-left: 4px solid var(--primary);
        }

        .nav-icon {
            font-size: 1.3rem;
            min-width: 30px;
            text-align: center;
        }

        .nav-text {
            transition: var(--transition);
        }

        .sidebar.collapsed .nav-text {
            display: none;
        }

        /* Main Content */
        .main-content {
            margin-left: 250px;
            flex: 1;
            transition: var(--transition);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-content.expanded {
            margin-left: 60px;
        }

        .page {
            display: none;
            animation: fadeIn 0.5s;
            width: 100%;
            max-width: 600px;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Timer Page */
        .timer-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }

        .current-task-display {
            background: linear-gradient(135deg, var(--secondary), #3DBDB6);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            margin-bottom: 20px;
            font-weight: 600;
            display: inline-block;
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .task-selector {
            margin-bottom: 20px;
        }

        .task-selector select {
            padding: 10px 20px;
            border: 2px solid var(--light);
            border-radius: 25px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            transition: var(--transition);
            min-width: 200px;
        }

        .task-selector select:focus {
            outline: none;
            border-color: var(--secondary);
        }

        .timer-display {
            font-size: 5rem;
            font-weight: 300;
            color: var(--dark);
            margin: 30px 0;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.05em;
        }

        .timer-label {
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .timer-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.4);
        }

        .btn-secondary {
            background: var(--light);
            color: var(--dark);
        }

        .btn-secondary:hover {
            background: var(--secondary);
            color: white;
            transform: translateY(-2px);
        }

        .session-dots {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--light);
            transition: var(--transition);
        }

        .dot.completed {
            background: var(--secondary);
            box-shadow: 0 0 10px rgba(78, 205, 196, 0.5);
        }

        .pomodoro-stats {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--light);
            display: flex;
            justify-content: space-around;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--dark);
            opacity: 0.7;
        }

        /* Tasks Page */
        .tasks-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            max-height: 80vh;
            overflow-y: auto;
        }

        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .tasks-title {
            font-size: 2rem;
            color: var(--dark);
        }

        .add-task-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .task-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid var(--light);
            border-radius: 50px;
            font-size: 1rem;
            transition: var(--transition);
        }

        .task-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            background: var(--light);
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            position: relative;
        }

        .task-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
        }

        .task-item.default {
            background: linear-gradient(135deg, #f5f5f5, #e8e8e8);
            border: 2px solid var(--secondary);
        }

        .task-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .task-item.completed .task-checkbox {
            background: var(--secondary);
            border-color: var(--secondary);
        }

        .task-item.completed .task-checkbox::after {
            content: '✓';
            color: white;
            font-size: 0.8rem;
        }

        .task-text {
            flex: 1;
            color: var(--dark);
        }

        .task-info {
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 0.9rem;
            color: var(--dark);
            opacity: 0.7;
        }

        .task-pomodoros {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .task-actions {
            display: flex;
            gap: 10px;
        }

        .task-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
            padding: 5px;
        }

        .task-btn:hover {
            transform: scale(1.2);
        }

        .task-btn.delete {
            color: var(--primary);
        }

        .task-btn.edit {
            color: var(--secondary);
        }

        .task-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .task-btn:disabled:hover {
            transform: scale(1);
        }

        .default-badge {
            background: var(--secondary);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 10px;
        }

        /* Settings Page */
        .settings-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .settings-title {
            font-size: 2rem;
            color: var(--dark);
            margin-bottom: 30px;
        }

        .setting-group {
            margin-bottom: 25px;
        }

        .setting-label {
            display: block;
            margin-bottom: 10px;
            color: var(--dark);
            font-weight: 600;
        }

        .setting-input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid var(--light);
            border-radius: 10px;
            font-size: 1rem;
            transition: var(--transition);
        }

        .setting-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .setting-input[type="number"] {
            width: 100px;
        }

        .save-settings-btn {
            margin-top: 20px;
            width: 100%;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }

            .sidebar-title {
                display: none;
            }

            .nav-text {
                display: none;
            }

            .nav-item {
                justify-content: center;
                padding: 15px;
            }

            .main-content {
                margin-left: 60px;
            }

            .timer-display {
                font-size: 3rem;
            }

            .pomodoro-stats {
                flex-direction: column;
                gap: 15px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--light);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Pomodoro</span>
            <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="showPage('timer')">
                <span class="nav-icon">⏱️</span>
                <span class="nav-text">Timer</span>
            </li>
            <li class="nav-item" onclick="showPage('tasks')">
                <span class="nav-icon">📝</span>
                <span class="nav-text">Tasks</span>
            </li>
            <li class="nav-item" onclick="showPage('settings')">
                <span class="nav-icon">⚙️</span>
                <span class="nav-text">Settings</span>
            </li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Timer Page -->
        <div class="page active" id="timer-page">
            <div class="timer-container">
                <div class="current-task-display" id="currentTaskDisplay">
                    Working on: General Tasks
                </div>
                <div class="task-selector">
                    <select id="taskSelect" onchange="selectTask()">
                        <!-- Tasks will be populated here -->
                    </select>
                </div>
                <div class="timer-label" id="timerLabel">Focus Time</div>
                <div class="timer-display" id="timerDisplay">25:00</div>
                <div class="timer-controls">
                    <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">START</button>
                    <button class="btn btn-secondary" onclick="resetTimer()">RESET</button>
                    <button class="btn btn-secondary" onclick="skipSession()">SKIP</button>
                </div>
                <div class="session-dots" id="sessionDots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div class="pomodoro-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="todayPomodoros">0</div>
                        <div class="stat-label">Today's Pomodoros</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="taskPomodoros">0</div>
                        <div class="stat-label">Task Pomodoros</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tasks Page -->
        <div class="page" id="tasks-page">
            <div class="tasks-container">
                <div class="tasks-header">
                    <h2 class="tasks-title">My Tasks</h2>
                </div>
                <div class="add-task-form">
                    <input type="text" class="task-input" id="taskInput" placeholder="Add a new task...">
                    <button class="btn btn-primary" onclick="addTask()">ADD</button>
                </div>
                <ul class="task-list" id="taskList"></ul>
            </div>
        </div>

        <!-- Settings Page -->
        <div class="page" id="settings-page">
            <div class="settings-container">
                <h2 class="settings-title">Settings</h2>
                <div class="setting-group">
                    <label class="setting-label">Focus Duration (minutes)</label>
                    <input type="number" class="setting-input" id="focusDuration" value="25" min="1" max="60">
                </div>
                <div class="setting-group">
                    <label class="setting-label">Short Break Duration (minutes)</label>
                    <input type="number" class="setting-input" id="shortBreakDuration" value="5" min="1" max="30">
                </div>
                <div class="setting-group">
                    <label class="setting-label">Long Break Duration (minutes)</label>
                    <input type="number" class="setting-input" id="longBreakDuration" value="15" min="1" max="60">
                </div>
                <div class="setting-group">
                    <label class="setting-label">Sessions Until Long Break</label>
                    <input type="number" class="setting-input" id="sessionsUntilLong" value="4" min="2" max="10">
                </div>
                <div class="setting-group">
                    <label class="setting-label">Auto-start Breaks</label>
                    <input type="checkbox" id="autoStartBreaks">
                </div>
                <div class="setting-group">
                    <label class="setting-label">Auto-start Focus Sessions</label>
                    <input type="checkbox" id="autoStartFocus">
                </div>
                <button class="btn btn-primary save-settings-btn" onclick="saveSettings()">SAVE SETTINGS</button>
            </div>
        </div>
    </main>
</body>
</html>
