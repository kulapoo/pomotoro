name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (without leading v)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate the release: all tests must pass before any artifacts are built.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libpango1.0-dev \
            libgdk-pixbuf2.0-dev \
            libcairo2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace

  # Build and publish per-OS artifacts via the official Tauri action.
  # Only the desktop app (apps/tauri-app) ships; the pomotoro-cli and
  # cosmic-de crates are intentional stubs (see ROADMAP.md) and are
  # intentionally NOT bundled here.
  publish:
    name: Build and publish (${{ matrix.settings.os }})
    needs: test
    runs-on: ${{ matrix.settings.runner }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: linux
            runner: ubuntu-latest
            args: ""
          - os: windows
            runner: windows-latest
            args: ""
          - os: macos-universal
            runner: macos-latest
            args: "--target universal-apple-darwin"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libpango1.0-dev \
            libgdk-pixbuf2.0-dev \
            libcairo2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/react-ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ runner.os == 'macOS' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/react-ui

      - name: Build frontend
        run: npm run build
        working-directory: apps/react-ui

      # The tauri-action builds, bundles, and uploads artifacts to a GitHub
      # Release for the tag that triggered this workflow.
      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/tauri-app
          tagName: ${{ github.ref_name }}
          releaseName: "Pomotoro ${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.settings.args }}
